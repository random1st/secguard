apiVersion: v2
name: secguard
description: Security guard HTTP service for AI agent hooks (Claude Code, Codex, Gemini CLI, MCP). Catches destructive shell commands before execution.
type: application
# Chart version is bumped together with appVersion so users can pin
# both via `helm install --version X.Y.Z`. The release.yml workflow
# packages this chart into the OCI Helm registry on GHCR alongside
# the secguard Docker image.
version: 0.5.2
appVersion: "0.5.2"
home: https://github.com/diana-random1st/secguard
sources:
  - https://github.com/diana-random1st/secguard
maintainers:
  - name: random1st
    url: https://github.com/diana-random1st
keywords:
  - security
  - ai-agents
  - claude-code
  - codex
  - guard
  - shell
